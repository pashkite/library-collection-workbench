name: Update holdings JSON

on:
  schedule:
    # KST 04:10 daily
    - cron: '10 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-holdings:
    runs-on: ubuntu-latest
    env:
      DATA4LIBRARY_KEY: ${{ secrets.DATA4LIBRARY_KEY }}
      LIB_CODE: ${{ vars.LIB_CODE || 'sample' }}
      LIB_NAME: ${{ vars.LIB_NAME || '달성군립도서관' }}
      DAILY_LOOKBACK_DAYS: ${{ vars.DAILY_LOOKBACK_DAYS || '7' }}
      PAGE_SIZE: ${{ vars.PAGE_SIZE || '300' }}
      API_CALL_LIMIT: '450'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run update:holdings:daily
      - name: Commit updated holdings
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Update daily holdings JSON'
          file_pattern: public/data/holdings.latest.json public/data/holdings.meta.json
